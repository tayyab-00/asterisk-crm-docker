[global]
type=global
max_forwards=70
user_agent=Asterisk PBX

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ── WebRTC endpoint template (agents/softphone) ───────────────────────────────
; NOTE: media_address, dtls_cert_file, dtls_private_key are injected by
; entrypoint.sh on every container start from ASTERISK_IP env var.
; This ensures correct RTP routing and prevents one-way audio.
[webrtc_endpoint](!)
type=endpoint
context=default
disallow=all
allow=opus,ulaw,alaw
webrtc=yes
dtls_auto_generate_cert=no
dtls_cert_file=/etc/asterisk/keys/asterisk.pem
dtls_private_key=/etc/asterisk/keys/asterisk.key
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=active
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
use_avpf=yes
direct_media=no
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes
bundle=no
media_address=ASTERISK_IP_PLACEHOLDER
rtp_keepalive=15

[webrtc_aor](!)
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=30

[webrtc_auth](!)
type=auth
auth_type=userpass

; ── Static fallback endpoints (overridden by realtime DB) ────────────────────
; NOTE: All agent endpoints are managed via realtime DB (ps_endpoints table)
; These are only here as fallback if realtime is not yet connected
[100](webrtc_endpoint)
type=endpoint
auth=100
aors=100
callerid=Echo Test <100>

[100](webrtc_aor)
type=aor

[100](webrtc_auth)
type=auth
username=100
password=asterisk
