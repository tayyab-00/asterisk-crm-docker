[general]
static=yes
writeprotect=no

[globals]
REALTIME_SWITCH=Realtime

[default]
; Realtime switch — IVR/routing rules and trunk contexts loaded from DB
switch => Realtime/@default

; Echo test
exten => 100,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; Voicemail check
exten => *98,1,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; 3-digit extensions — record + dial + voicemail fallback
exten => _1XX,1,NoOp(Calling ${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; 4-digit extensions
exten => _1XXX,1,NoOp(Calling ${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; Outbound trunk patterns (_0., _+.) are written to asterisk_extensions DB
; by pbx_service._build_trunk_dialplan when a trunk is created from the CRM.
; They are loaded via switch => Realtime/@default above.
; Generic _X. is intentionally omitted — unknown destinations should not auto-dial.

; ── Dynamic contexts ───────────────────────────────────────────────────────────────
; Trunk inbound contexts and IVR contexts are registered here automatically
; by the CRM (pbx_service._register_context) when created from the frontend.
; Each gets a stub: [context_name] + switch => Realtime/@context_name
; The actual dialplan rows live in the asterisk_extensions DB table.
; Asterisk reads them live — no reload needed after the stub is registered.
