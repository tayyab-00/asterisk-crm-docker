[general]
static=yes
writeprotect=no

[globals]
REALTIME_SWITCH=Realtime

[default]
; Realtime switch — IVR/routing rules and trunk contexts loaded from DB
switch => Realtime/@default

; Echo test
exten => 100,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; Voicemail check
exten => *98,1,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; 3-digit extensions — record + dial + voicemail fallback
exten => _1XX,1,NoOp(Calling ${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; 4-digit extensions
exten => _1XXX,1,NoOp(Calling ${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; Outbound via trunk — dial 9 + number
exten => _9X.,1,NoOp(Outbound ${EXTEN:1} via trunk)
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN:1}@${TRUNK_ENDPOINT},60)
 same => n,Hangup()

; Outbound via GSM trunk — dial 0 + number (e.g. 0971XXXXXXXX)
exten => _0.,1,NoOp(Outbound via GSM: ${EXTEN:1})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/sip:${EXTEN:1}@GSM_GATEWAY_IP_PLACEHOLDER\;transport=udp,60)
 same => n,Hangup()

; Generic outbound
exten => _X.,1,NoOp(Outbound ${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN},60)
 same => n,Hangup()

; ── GSM Trunk inbound contexts ────────────────────────────────────────────────
; Each trunk added via CRM gets its own context here.
; Context name = from-trunk-<sip_username> (e.g. from-trunk-admin)
; Add a new [from-trunk-XXX] block for each GSM gateway trunk.
[from-trunk-admin]
exten => s,1,NoOp(Inbound from GSM trunk)
 same => n,Answer()
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()
exten => _X.,1,NoOp(Inbound any exten)
 same => n,Answer()
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()
