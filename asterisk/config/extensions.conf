[general]
static=yes
writeprotect=no

[globals]
REALTIME_SWITCH=Realtime

[default]
; Realtime switch — IVR/routing rules and trunk contexts loaded from DB
switch => Realtime/@default

; Echo test
exten => 100,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; Voicemail check
exten => *98,1,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; 3-digit extensions — record + dial + voicemail fallback
exten => _1XX,1,NoOp(Calling ${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; 4-digit extensions
exten => _1XXX,1,NoOp(Calling ${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; Outbound via trunk — dial 9 + number
exten => _9X.,1,NoOp(Outbound ${EXTEN:1} via trunk)
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN:1}@${TRUNK_ENDPOINT},60)
 same => n,Hangup()

; Generic outbound
exten => _X.,1,NoOp(Outbound ${EXTEN})
 same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n,Set(CDR(userfield)=${RECORDING_FILE})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN},60)
 same => n,Hangup()
