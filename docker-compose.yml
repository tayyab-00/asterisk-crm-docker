version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: asterisk_db
    restart: always
    environment:
      POSTGRES_DB: asterisk_cdr
      POSTGRES_USER: asterisk
      POSTGRES_PASSWORD: ${PG_PASSWORD:-asterisk123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asterisk -d asterisk_cdr"]
      interval: 5s
      timeout: 5s
      retries: 10

  asterisk:
    build: .
    container_name: asterisk_pbx
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: host
    volumes:
      - asterisk_keys:/etc/asterisk/keys
      - asterisk_recordings:/var/spool/asterisk/monitor
      - asterisk_moh:/var/lib/asterisk/moh
      - asterisk_logs:/var/log/asterisk
    environment:
      ASTERISK_IP: ${ASTERISK_IP:-127.0.0.1}
      PG_HOST: ${PG_HOST:-127.0.0.1}
      PG_PORT: ${PG_PORT:-5432}
      PG_DB: ${PG_DB:-asterisk_cdr}
      PG_USER: ${PG_USER:-asterisk}
      PG_PASSWORD: ${PG_PASSWORD:-asterisk123}
      AMI_SECRET: ${AMI_SECRET:-tayyab}
      ARI_PASSWORD: ${ARI_PASSWORD:-crm_ari_pass123}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    entrypoint: ["/entrypoint.sh"]

  # ── Optional: SSH reverse tunnel to AWS backend ──────────────────────────────
  # Only starts if AWS_HOST and AWS_KEY_PATH are set in .env
  # Forwards: 15432 -> PostgreSQL, 15038 -> AMI on AWS
  tunnel:
    image: alpine:3.19
    container_name: asterisk_tunnel
    restart: always
    profiles: ["tunnel"]  # only starts with: docker compose --profile tunnel up
    volumes:
      - ${AWS_KEY_PATH:-/dev/null}:/root/.ssh/aws_key:ro
    environment:
      AWS_HOST: ${AWS_HOST:-}
      AWS_USER: ${AWS_USER:-ubuntu}
      TUNNEL_PG_PORT: ${TUNNEL_PG_PORT:-15432}
      TUNNEL_AMI_PORT: ${TUNNEL_AMI_PORT:-15038}
    command: >
      sh -c "
        apk add --no-cache openssh-client autossh &&
        chmod 600 /root/.ssh/aws_key &&
        ssh -i /root/.ssh/aws_key -o StrictHostKeyChecking=no $$AWS_USER@$$AWS_HOST
          'fuser -k $${TUNNEL_PG_PORT}/tcp 2>/dev/null; fuser -k $${TUNNEL_AMI_PORT}/tcp 2>/dev/null; true' 2>/dev/null || true &&
        sleep 2 &&
        exec autossh -M 0 -N
          -o ServerAliveInterval=30
          -o ServerAliveCountMax=3
          -o StrictHostKeyChecking=no
          -o ExitOnForwardFailure=yes
          -i /root/.ssh/aws_key
          -R 127.0.0.1:$${TUNNEL_PG_PORT}:127.0.0.1:5432
          -R 127.0.0.1:$${TUNNEL_AMI_PORT}:127.0.0.1:5038
          $$AWS_USER@$$AWS_HOST
      "

volumes:
  postgres_data:
  asterisk_keys:
  asterisk_recordings:
  asterisk_moh:
  asterisk_logs:
